# CryptoAnalysis 配置文件模板
# 复制为 config.yaml 并填入实际值

# API 配置
api:
  coinglass:
    api_key: "your_coinglass_api_key_here"
    base_url: "https://open-api-v4.coinglass.com/api"
  
  hyperliquid:
    base_url: "https://api.hyperliquid.xyz"
    # Hyperliquid 不需要 API key

# 交易配置
trading:
  symbols:
    - BTC
    - ETH
    - SOL
  
  # 默认风控参数
  default_risk:
    max_position_usd: 10000    # 单币最大仓位
    max_leverage: 2            # 最大杠杆
    stop_loss: 0.03            # 3% 止损
    take_profit: 0.05          # 5% 止盈

# 数据库配置（可选）
database:
  type: sqlite                 # sqlite / postgresql
  path: "./data/crypto.db"     # SQLite 路径
  # postgresql:
  #   host: localhost
  #   port: 5432
  #   database: crypto
  #   user: postgres
  #   password: password

# 日志配置
logging:
  level: INFO                  # DEBUG / INFO / WARNING / ERROR
  file: "./logs/crypto.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# 回测配置
backtest:
  start_date: "2024-01-01"
  end_date: "2025-12-31"
  initial_capital: 100000      # 初始资金 $100K
  commission: 0.0005           # 手续费 0.05%
